<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trình Tạo Slide Từ Vựng Tiếng Anh Tự Động</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; color: #fff; display: flex; flex-direction: row; height: 100vh; overflow: hidden; position: relative; }
        
        /* CẤU HÌNH KHU VỰC CÀI ĐẶT */
        .setup-container { width: 35%; min-width: 320px; padding: 25px; background: #162447; display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 15px rgba(0,0,0,0.3); z-index: 10; transition: transform 0.3s ease; }
        .setup-container.hidden { transform: translateX(-100%); position: absolute; left: 0; top: 0; width: 0; min-width: 0; padding: 0; overflow: hidden; }
        h2 { color: #e43f5a; font-size: 24px; margin-bottom: 5px; }
        label { font-weight: bold; font-size: 14px; color: #cbd5e1; }
        textarea { width: 100%; height: 180px; padding: 12px; border-radius: 8px; border: none; background: #1f4068; color: #fff; font-size: 16px; resize: none; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #1f4068; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #e43f5a; color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #ff4a68; transform: translateY(-2px); }
        .share-section { margin-top: auto; padding-top: 15px; border-top: 1px solid #1f4068; }
        
        /* CẤU HÌNH TRÌNH CHIẾU SLIDE */
        .slide-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; width: 100%; height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('https://i.pinimg.com/736x/e5/e4/ed/e5e4edc01e734b569c91d1a65ad335ad.jpg');
            background-size: cover; background-position: center;
        }
        .slide-content { text-align: center; opacity: 0; transform: scale(0.9); transition: all 0.5s ease-in-out; display: none; width: 100%; max-width: 95%; margin-bottom: 60px; }
        .slide-content.active { opacity: 1; transform: scale(1); display: block; }
        
        /* Font chữ cho Từ Tiếng Anh - Định dạng Quicksand (chữ a tròn) */
        .vocab-word { font-family: 'Time News Roman', sans-serif; font-size: 7.5vw; font-weight: 700; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,0.4); margin-bottom: 20px; word-wrap: break-word; line-height: 1.2; }
        
        /* Font chữ cho Phiên âm IPA - Định dạng Arial */
        .vocab-ipa { font-family: Arial, sans-serif; font-size: 3vw; color: #818cf8; font-style: normal; margin-bottom: 25px; word-wrap: break-word; }
        
        /* Font chữ cho Nghĩa Tiếng Việt - Định dạng Quicksand */
        .vocab-meaning { font-family: 'Quicksand', sans-serif; font-size: 4vw; color: #e2e8f0; font-weight: 500; word-wrap: break-word; line-height: 1.3; }
        
        /* THANH ĐIỀU KHIỂN & NÚT THOÁT */
        .controls { position: absolute; bottom: 30px; display: flex; align-items: center; gap: 15px; background: rgba(22, 36, 71, 0.8); padding: 10px 25px; border-radius: 30px; backdrop-filter: blur(5px); z-index: 5; }
        .ctrl-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 5px 10px; }
        .ctrl-btn:hover { color: #e43f5a; }
        
        /* Nút thoát mờ và nhỏ hơn nằm cùng thanh điều khiển */
        .exit-btn { background: rgba(228, 63, 90, 0.3); color: rgba(255, 255, 255, 0.7); padding: 6px 14px; border-radius: 15px; border: 1px solid rgba(228, 63, 90, 0.4); font-size: 13px; font-weight: 500; cursor: pointer; display: none; transition: all 0.2s; font-family: 'Segoe UI', sans-serif; margin-left: 10px; }
        .exit-btn:hover { background: rgba(228, 63, 90, 0.8); color: #fff; opacity: 1; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .setup-container { position: absolute; left: 0; top: 0; width: 100%; height: 100vh; overflow-y: auto; padding: 20px; }
            .setup-container.hidden { transform: translateX(-100%); position: absolute; }
            
            .slide-content { margin-bottom: 120px; }
            .vocab-word { font-size: 13vw; margin-bottom: 10px; }
            .vocab-ipa { font-size: 6.5vw; margin-bottom: 10px; }
            .vocab-meaning { font-size: 8vw; }
            
            .controls { bottom: 30px; width: 90%; justify-content: space-around; padding: 10px 15px; border-radius: 20px; }
            .ctrl-btn { font-size: 28px; }
            .exit-btn { padding: 6px 12px; font-size: 12px; margin-left: 5px; }
        }
    </style>
</head>
<body>

    <div class="setup-container" id="setupForm">
        <h2>Bộ Tạo Slide Từ Vựng</h2>
        <div>
            <label>1. Nhập danh sách từ (Mỗi dòng 1 từ):</label>
            <textarea id="vocabInput">good-looking	/ˈɡʊd lʊkɪŋ/	Ưa nhìn, đẹp trai
up-to-date	/ˌʌp tə ˈdeɪt/	Cập nhật mới nhất
state-of-the-art	/ˌsteɪt əv ði ˈɑːt/	Hiện đại nhất</textarea>
        </div>
        <div>
            <label>2. Tỉ lệ thời gian nghỉ (Số âm tiết × Tỉ lệ):</label>
            <select id="durationInput">
                <option value="0.3">Nhanh (Số âm tiết × 0.3s)</option>
                <option value="0.4">Vừa phải (Số âm tiết × 0.4s)</option>
                <option value="0.5" selected>Mặc định (Số âm tiết × 0.5s)</option>
                <option value="0.6">Thong thả (Số âm tiết × 0.6s)</option>
                <option value="0.7">Chậm (Số âm tiết × 0.7s)</option>
                <option value="0.8">Rất chậm (Số âm tiết × 0.8s)</option>
            </select>
        </div>
        <div>
            <label>3. Chọn Giọng Đọc Tiếng Anh:</label>
            <select id="voiceSelect"><option value="">Đang tải giọng đọc...</option></select>
        </div>
        <div>
            <label>4. Chọn số lần đọc mỗi từ:</label>
            <select id="repeatSelect">
                <option value="1">Đọc 1 lần</option>
                <option value="2" selected>Đọc 2 lần</option>
                <option value="3">Đọc 3 lần</option>
                <option value="4">Đọc 4 lần</option>
                <option value="5">Đọc 5 lần</option>
            </select>
        </div>
        <button onclick="startPresentation()">Bắt Đầu Trình Chiếu</button>

        <div class="share-section">
            <button style="background: #10b981;" onclick="generateShareLink()">Copy Link Bài Học Cho HS</button>
        </div>
    </div>

    <div class="slide-container">
        <div id="slideShowArea" style="width: 100%; display: flex; justify-content: center;">
            <div style="font-size: 24px; color: #cbd5e1; text-align: center; padding: 0 20px;">Đang tải bài học...</div>
        </div>
        
        <div class="controls" id="playerControls" style="display: none;">
            <button class="ctrl-btn" onclick="prevSlide()">⏮</button>
            <button class="ctrl-btn" id="playPauseBtn" onclick="togglePause()">⏸</button>
            <button class="ctrl-btn" onclick="nextSlide()">⏭</button>
            <button class="exit-btn" id="exitBtn" onclick="stopPresentation()">Thoát</button>
        </div>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let voices = [];
        let vocabList = [];
        let currentIndex = 0;
        let repeatCount = 0; 
        let slideInterval = null;
        let isPaused = false;

        function loadVoices() {
            voices = synth.getVoices();
            let select = document.getElementById('voiceSelect');
            if (!select) return;
            select.innerHTML = '';
            let enVoices = voices.filter(v => v.lang.includes('en'));
            if(enVoices.length === 0) enVoices = voices;
            enVoices.forEach(voice => {
                let option = document.createElement('option');
                option.value = voice.name;
                option.innerText = `${voice.name} (${voice.lang})`;
                select.appendChild(option);
            });
            checkUrlParams();
        }
        
        if (synth.onvoiceschanged !== undefined) { 
            synth.onvoiceschanged = loadVoices; 
        } else {
            loadVoices();
        }

        function countSyllables(text) {
            let words = text.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/).filter(w => w !== '');
            if (words.length === 0) return 1;
            
            let totalSyllables = 0;
            words.forEach(word => {
                if (word.length <= 3) { totalSyllables += 1; return; }
                
                let w = word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
                w = w.replace(/^y/, '');
                let sylMatches = w.match(/[aeiouy]{1,2}/g);
                let count = sylMatches ? sylMatches.length : 1;
                
                totalSyllables += count;
            });
            
            return totalSyllables;
        }

        function checkUrlParams() {
            let urlParams = new URLSearchParams(window.location.search);
            let data = urlParams.get('data');
            let time = urlParams.get('time');
            let repeat = urlParams.get('repeat');
            let voiceParam = urlParams.get('voice');
            
            if (data) {
                try {
                    let decodedData = decodeURIComponent(atob(data));
                    document.getElementById('vocabInput').value = decodedData;
                    if (time) document.getElementById('durationInput').value = time;
                    if (repeat) document.getElementById('repeatSelect').value = repeat;
                    
                    if (voiceParam) {
                        let decodedVoice = decodeURIComponent(voiceParam);
                        setTimeout(() => {
                            let select = document.getElementById('voiceSelect');
                            if(select) select.value = decodedVoice;
                        }, 300);
                    }
                    
                    setTimeout(() => { startPresentation(); }, 600);
                } catch(e) {
                    document.getElementById('slideShowArea').innerHTML = `<div style="color: #e43f5a; text-align:center;">Link cấu trúc lỗi! Không thể giải mã dữ liệu.</div>`;
                }
            } else {
                document.getElementById('slideShowArea').innerHTML = `<div style="font-size: 22px; color: #cbd5e1; text-align: center; padding: 0 20px;">Nhập từ vựng bên trái rồi bấm nút bắt đầu...</div>`;
            }
        }

        function startPresentation() {
            let text = document.getElementById('vocabInput').value.trim();
            if(!text) return alert("Vui lòng nhập từ vựng!");

            vocabList = text.split('\n').map(line => {
                line = line.trim();
                if (!line) return null;

                let word = '', ipa = '', meaning = '';

                let ipaMatch = line.match(/\/([^\/]+)\//);
                if (ipaMatch) {
                    ipa = '/' + ipaMatch[1].trim() + '/';
                    line = line.replace(ipaMatch[0], '|||');
                }

                let parts = line.split(/\t|\|\|\||\|/).map(p => p.trim()).filter(p => p !== '');

                if (ipaMatch) {
                    word = parts[0] || '';
                    meaning = parts[1] || '';
                } else {
                    if (parts.length >= 2) {
                        word = parts[0] || '';
                        meaning = parts.slice(1).join(' ') || '';
                    } else {
                        word = parts[0] || '';
                    }
                }

                word = word.replace(/^[-=\s]+|[-=\s]+$/g, ''); 

                return { word: word, ipa: ipa, meaning: meaning };
            }).filter(item => item !== null);

            if(vocabList.length === 0) return alert("Không tìm thấy dữ liệu từ vựng hợp lệ!");

            currentIndex = 0;
            repeatCount = 0; 
            isPaused = false;
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('exitBtn').style.display = 'inline-block';
            document.getElementById('playerControls').style.display = 'flex';
            
            renderSlide();
            playCurrentCycle();
        }

        function renderSlide() {
            let area = document.getElementById('slideShowArea');
            let item = vocabList[currentIndex];
            area.innerHTML = `
                <div class="slide-content active">
                    <div class="vocab-word">${item.word}</div>
                    ${item.ipa ? `<div class="vocab-ipa">${item.ipa}</div>` : ''}
                    ${item.meaning ? `<div class="vocab-meaning">${item.meaning}</div>` : ''}
                </div>
            `;
        }

        function playCurrentCycle() {
            if (slideInterval) clearTimeout(slideInterval);
            if (isPaused) return;

            let item = vocabList[currentIndex];
            let selectedVoiceName = document.getElementById('voiceSelect').value;
            let maxRepeat = parseInt(document.getElementById('repeatSelect').value);
            
            let rateSetting = parseFloat(document.getElementById('durationInput').value); 
            let syllables = countSyllables(item.word);
            
            let calculatedSeconds = syllables * rateSetting; 
            let finalSeconds = Math.min(Math.max(calculatedSeconds, 1), 7); 
            
            let finalDuration = finalSeconds * 1000; 

            let utterance = new SpeechSynthesisUtterance(item.word);
            let selectedVoice = voices.find(v => v.name === selectedVoiceName);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            synth.speak(utterance);
            repeatCount++; 

            utterance.onend = function() {
                if (isPaused) return;

                slideInterval = setTimeout(() => {
                    if (repeatCount < maxRepeat) {
                        playCurrentCycle();
                    } else {
                        repeatCount = 0;
                        if (currentIndex < vocabList.length - 1) {
                            currentIndex++;
                            renderSlide();
                            playCurrentCycle();
                        } else {
                            alert("Đã hoàn thành bài học!");
                            stopPresentation();
                        }
                    }
                }, finalDuration); 
            };
        }

        function generateShareLink() {
            let text = document.getElementById('vocabInput').value.trim();
            let time = document.getElementById('durationInput').value;
            let repeat = document.getElementById('repeatSelect').value;
            let voice = document.getElementById('voiceSelect').value;
            if(!text) return alert("Hãy nhập từ vựng trước khi tạo link!");
            
            let encodedData = btoa(encodeURIComponent(text));
            let baseUrl = window.location.href.split('?')[0];
            let shareUrl = `${baseUrl}?data=${encodedData}&time=${time}&repeat=${repeat}&voice=${encodeURIComponent(voice)}`;
            
            navigator.clipboard.writeText(shareUrl);
            alert("Đã copy đường link bài học! Link này sẽ giữ nguyên Từ vựng, Tốc độ nghỉ, Số lần đọc và Giọng đọc bạn đã chọn.");
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('playPauseBtn').innerText = isPaused ? '▶' : '⏸';
            if (!isPaused) playCurrentCycle();
            else { clearTimeout(slideInterval); synth.cancel(); }
        }

        function nextSlide() {
            if (currentIndex < vocabList.length - 1) {
                currentIndex++; repeatCount = 0; clearTimeout(slideInterval); synth.cancel(); renderSlide(); playCurrentCycle();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--; repeatCount = 0; clearTimeout(slideInterval); synth.cancel(); renderSlide(); playCurrentCycle();
            }
        }

        function stopPresentation() {
            clearTimeout(slideInterval);
            synth.cancel();
            repeatCount = 0;
            document.getElementById('setupForm').classList.remove('hidden');
            document.getElementById('exitBtn').style.display = 'none';
            document.getElementById('playerControls').style.display = 'none';
            document.getElementById('slideShowArea').innerHTML = `<div style="font-size: 24px; color: #cbd5e1; text-align: center;">Đã dừng trình chiếu.</div>`;
        }
        
        loadVoices();
    </script>
</body>
</html>
